- cat : 
  cat file1 >> file2 : 
    - Append file1 to file2 ( content )
  cat file1 > file2 : 
    - Overwrite file1 to file2 ( content )
  cat file1 file2 > file3 : 
    -  Overwrite file1 and file2 to file3 ( content )


