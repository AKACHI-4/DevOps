Structure of the network : 

OSI Model : 
  - 'Open Systems Interconnection model'
  - standad model for network communication 
  - Concept Based
  - 7 layers : 

  ```
  - Application Layer :
    - Implemented in software 
    - Ex : HTTP, FTP, SMTP, DNS

  - Presentation Layer :
    - ASCII to EBC DIC 
    - Change the format of data in machine representable binary format 
    - Ex : Encryption, Decryption, 
    Compression, Decompression, Translation 
    - Also provides abstraction

  - Session Layer :
    - Establishes, maintains and terminates the connection between two communicating network devices
    - Ex : Authentication, Authorization, Synchronization

  - Transport Layer :
    - How data get transferred from client to server and vice-versa defined under Transport Layer
    - Ex : TCP, UDP 
    - Segmentation : break the data into smaller chunks
    - Every segment contains : 
      - Source Port Number
      - Destination Port Number
      - Sequence Number
      - Acknowledgement Number
      - Checksum : Check reliability of data 
      - Data
    - Flow control :
      - Sender : How much data to send at a time
      - Receiver : How much data to accept at a time
    - Error control : 
      - Sender : How to detect the error
      - Receiver : How to correct the error
    ```
  -> Happening in source's network 

  ```
  - Network Layer :
    - Now we are in the server's network
    - Transmission of recieved data segments from source to dest. located in different network 
    - Ex : IP, ICMP, ARP, RARP, OSPF, BGP
    - Router lives over here 
    - Logical Addressing : IP Addressing done here
    - Assigns IP addresses to the sender and reciever in every data segment and forms IP packets 
    - Why ?  : So every data packet reach to the correct destination 
    - Routing : 
      - Static Routing : 
        - Routing table is manually configured by the network administrator
        - Routing table is not updated automatically
      - Dynamic Routing : 
        - Routing table is updated automatically by the routing protocols
        - Routing table is updated automatically
        - Ex : RIP, OSPF, BGP
    - Best path to take from source to destination's network : Used dijkstra for that 
    - load balacing also done here 

      ```
      - Every Packet will contain three things : sender, reciever and subnet mask  
      ```

  - Data Link Layer : 
    - Tasks : 
      - To give access of MAC Addresses to the Upper layers 
      - Controls how data is placed and recieved from the media using Media Access control (MAC) address
    - Add MAC address of sender and reciever in every frame and transport that frame to the physical layer
    - Physical Addressing : 
      MAC (Media access control) Addresses + 
        - 12 digit alphanumeric number of the network interface of our computer ( Different for every part of computer )
      + are assigned here to form a + 
      + frame
        - data unit of the data link layer 

  - Physical Layer : 
    - contains hardware section 
      - cables, connectors, repeaters, hubs, network adapters, etc.
      - In case of commun. between two friends it is router of 1st friends which sends these bits to router of 2nd friend
    - trasmitts bits over electrical, mechanical or radio channel or signals
    - electrical and light signal 
    - Ex : Ethernet, Wi-Fi, Bluetooth, USB, DSL
    - convert data into bits

  ```
  -> Happening in the network of ISP ( Internet Service Provider ) of Destination network


TCP/IP Model : 
  - Developed by ARPA 
  - Internet protocol suite
  - Practical Model 
  - 5 layers : 
    - Application Layer
    - Transport Layer
    - Internet/Network Layer
    - Data Link Layer
    - Physical Layer

  - Application Layer : consists applications th
  at use the internet
    - User interact with this 
    - Whatsapp, browser, etc.
    - In our device 
    - HTTP, FTP, SMTP, DNS
    - Client server architecture 

    Client server architecture : 
      - ping .-site url-.
        - ping : send a message from one computer to another to check whether it is reachable and active 
        - ping time : measures round trip time for messages sends from the originating host to a destination computer that are echoed back to the source
        - ping time is measured in milliseconds (ms)
        - ping time is also called latency
        - ping time is also called round trip time (RTT)
        - It can't be further reduced as we are getting best possible ping time or RTT

    Peer-to-peer (P2P) Architecture : 
      - No one dedicated or central server
      - decentralized network 
      - Ex : Bit-torrent, Blockchain
      - like there are some computers connected with each other 
      - and they are sharing data with each other 
      - every machine also working as a host and server
      - can be scaled up very rapidly 
      - Machines are connect with one another 

    Networking Devices : 
      Repeater : 
        - Physical Layer device
        - used to regenerate the signal over the same network before the signal becomes too weak or corrupted 
        - It doesn't amplify the signals
        - Extend length of the network cycle 
        - Two port device 

        - Hub : 
          - Also Physical Layer device
          - Multi port repeater 
          - connect multiple wire coming from multiple branches 
          - Broadcasts the data to all the connected devices
          - Single collision domain
        
        - Bridge : 
          - Data Link Layer 
          - Connects two LANs or segments of the same LAN
          - filters content by reading MAC addresses of source and destination 
  
        - Switch : 
          - Data Link Layer
          - Multi port bridge 
          - A Buffer and design that can boost its efficiency ( large number of ports imply less traffic ) and performance ( can handle more data ) 
          - Error checking before forwarding the data 
          - Switches are faster than bridges

        Routers :    
          - route data packets on their IP address 
          - Network Layer device - 
          - Normally connects LANs and WANs together and have a dynamically updating routing table based on which it makes decisions on routing the data packets

        GateWays : 
          - passage to connect two network together that may work upon different protocols or netwokring models 
          - works as the messanger agents that take data from one system, interpret it, and transfer it to another system 

        Brouter : 
        - bridging router 
        - device that combines features of both bridge and router
        - can work either at data link layer or at network layer
        - 

        Modem : 
          - Modulator-Demodulator
          - converts digital signal to analog signal and vice-versa
          - used to connect a computer to the internet via telephone line
          - used to connect a computer to the internet via cable television network
          - used to connect a computer to the internet via satellite

Protocols : 

  TCP/IP protocols :
    - HTTP
    - DHCP
    - FTP
      *(Files can now be transferred over HTTP)
    - SMTP
    - POP3 & IMAC
    - SSH-
    - VNC : for graphic control of remote computer

  - Telnet : 
    - Terminal Emulation Protocol 
    - Enables the user to log on to a remote computer using Telnet client and perform tasks as if they were working on that computer
    - port : 23
    - Not encoded or encrypted 

  UDP : 
    - user datagram protocol
    - connectionless protocol

  - There are number of process which happens in a program ( Application )

  Thread : Ligter version of the processes, Doing single task at a time 

  Sockets : 
    - Software sokets 
    - A interface between Processes and internet 

  Ports : 
    - Determine which application 
    - Now what about which process in that application ? 
    - Ephermal ports : 
      - Ephemeral ports, also known as dynamic ports or private ports, refer to a range of port numbers used by the operating system for temporary communication sessions. 

HTTP : 'Hypertext Transfer Protocol'

  - Client server protocol 
  - Application Layer protocol 
  - HTTP Methods : 
    - GET, POST, PUT, DELETE
  - Port : 80
  - stateless protocol

  ```
    HTTP (Application Layer) uses TCP (Transport Layer) to transport its messages.
  ```

  Status Code : 
   - Tells us the status of the response and request whethere it is fully transfered or not or any error occured or not
   - 1xx : Informational
   - 2xx : Success
   - 3xx : Redirection
   - 4xx : Client Error
   - 5xx : Server Error


